<!doctype html><html><head><script src="https://cdn.tailwindcss.com"></script>{% if turnstile_sitekey %}<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>{% endif %}<title>Sign in · Elefthero</title></head><body class="bg-slate-100 text-slate-900 min-h-screen grid place-items-center p-6"><form method="post" class="w-full max-w-md grid gap-4 bg-white border border-slate-200 shadow-sm p-7 rounded-2xl"><h1 class="text-3xl font-bold">Elefthero</h1><p class="text-slate-600">The open-source way to invoice in Greece.</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for category,message in messages %}<p class="p-3 rounded border {{ 'bg-rose-100 border-rose-300 text-rose-900' if category == 'error' else 'bg-sky-100 border-sky-300 text-sky-950' }}">{{ message }}</p>{% endfor %}{% endwith %}<input required name="email" type="email" placeholder="Email" class="p-3 rounded bg-slate-50 border border-slate-300"><input required name="password" type="password" placeholder="Password" class="p-3 rounded bg-slate-50 border border-slate-300">{% if turnstile_sitekey %}<div class="cf-turnstile" data-sitekey="{{ turnstile_sitekey }}" data-theme="light"></div>{% endif %}<button class="bg-cyan-500 text-white font-bold p-3 rounded">Sign in</button></form></body></html>

{% extends 'base.html' %}{% block content %}<div class="max-w-4xl"><a href="{{ url_for('dashboard') }}" class="text-cyan-300 text-sm">← {{ t.dashboard }}</a><h1 class="text-3xl font-semibold mt-4 mb-7">{{ t.new_invoice }}</h1><form method="post" class="grid gap-5 bg-slate-900 border border-slate-800 p-6 rounded-2xl text-white"><label>AADE invoice type<select id="invoice-type" required name="invoice_type" class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-lg p-3">{% for code, label in invoice_types.items() %}<option value="{{ code }}">{{ code }} — {{ label }}</option>{% endfor %}</select></label><label>Payment method<select required name="payment_method" class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-lg p-3">{% for code,label in payment_methods.items() %}<option value="{{ code }}" {% if code == '3' %}selected{% endif %}>{{ code }} — {{ label }}</option>{% endfor %}</select></label><label>Series (configured)<input value="{{ series }}" disabled class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-lg p-3"></label><label>Saved client<select id="client-picker" class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-lg p-3"><option value="">Choose or enter manually</option>{% for client in clients %}<option data-name="{{ client.name }}" data-vat="{{ client.vat_number }}" data-address="{{ client.address or '' }}" data-profession="{{ client.profession or '' }}">{{ client.name }} · {{ client.vat_number }}</option>{% endfor %}</select></label><label>Invoice number<input required name="number" value="{{ next_number }}" class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-lg p-3"></label><label>Customer<input required name="customer" class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-lg p-3"></label><label>Customer VAT / ΑΦΜ<input required name="vat_number" class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-lg p-3"></label><label>Customer address<input name="customer_address" class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-lg p-3"></label><input type="hidden" name="customer_profession"><label>Issue date<input required name="issue_date" type="date" value="{{ today }}" min="{{ today }}" max="{{ today }}" class="mt-2 w-full bg-slate-800 border border-slate-700 rounded-lg p-3"></label><div><div class="flex justify-between items-center"><div><h2 class="font-semibold">Invoice lines</h2><p class="text-sm text-slate-400">Default: category1_3. E3 is wholesale for invoices and retail for receipts.</p></div><button type="button" id="add-line" class="text-cyan-300">+ Add line</button></div><div id="lines" class="grid gap-3 mt-3"></div></div><button class="bg-cyan-400 text-slate-950 font-bold p-3 rounded-lg">Save draft</button></form></div><template id="line"><div class="p-4 bg-slate-800 rounded-xl grid md:grid-cols-3 gap-3"><input required name="line_description" placeholder="Description" class="p-3 bg-slate-700 rounded"><input required name="line_net" type="number" step="0.01" min="0" placeholder="Net €" class="p-3 bg-slate-700 rounded"><select name="line_vat_rate" class="p-3 bg-slate-700 rounded"><option value="24">VAT 24%</option><option value="13">VAT 13%</option><option value="6">VAT 6%</option><option value="0">VAT 0%</option></select><select name="line_vat_exemption_reason" class="p-3 bg-slate-700 rounded"><option value="">Exemption reason (only for 0%)</option>{% for code,label in exemption_reasons.items() %}<option value="{{ code }}">{{ code }} — {{ label }}</option>{% endfor %}</select><select required name="line_income_category" class="p-3 bg-slate-700 rounded">{% for code,label in income_categories.items() %}<option value="{{ code }}" {% if code == 'category1_3' %}selected{% endif %}>{{ code }} — {{ label }}</option>{% endfor %}</select><select required name="line_income_type" class="p-3 bg-slate-700 rounded">{% for code,label in income_types.items() %}<option value="{{ code }}" {% if code == 'E3_561_001' %}selected{% endif %}>{{ code }} — {{ label }}</option>{% endfor %}</select></div></template><script>const lines=document.getElementById('lines'),tpl=document.getElementById('line'),invoiceType=document.getElementById('invoice-type');function defaults(){const retail=['11.1','11.2','11.3','11.4','11.5'].includes(invoiceType.value);document.querySelectorAll('[name=line_income_category]').forEach(x=>x.value='category1_3');document.querySelectorAll('[name=line_income_type]').forEach(x=>x.value=retail?'E3_561_003':'E3_561_001')}function add(){lines.append(tpl.content.cloneNode(true));defaults()}add();document.getElementById('add-line').onclick=add;invoiceType.onchange=defaults;document.getElementById('client-picker').onchange=function(){let o=this.options[this.selectedIndex];document.querySelector('[name=customer]').value=o.dataset.name||'';document.querySelector('[name=vat_number]').value=o.dataset.vat||'';document.querySelector('[name=customer_address]').value=o.dataset.address||'';document.querySelector('[name=customer_profession]').value=o.dataset.profession||''}</script>{% endblock %}

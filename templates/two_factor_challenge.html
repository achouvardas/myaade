<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><script src="https://cdn.tailwindcss.com"></script><title>Two-factor authentication · Elefthero</title></head><body class="bg-slate-100 text-slate-900 min-h-screen grid place-items-center p-6"><form method="post" class="w-full max-w-md grid gap-4 bg-white border border-slate-200 shadow-sm p-7 rounded-2xl"><h1 class="text-3xl font-bold">Two-factor authentication</h1><p class="text-slate-600">Enter the six-digit code from your authenticator app for {{ email }}.</p>{% with messages=get_flashed_messages(with_categories=true) %}{% for category,message in messages %}<p class="p-3 rounded bg-rose-100 text-rose-900">{{ message }}</p>{% endfor %}{% endwith %}<label>Authenticator code<input required name="code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" class="w-full mt-1 p-3 rounded border border-slate-300" autofocus></label><button class="bg-cyan-500 text-white font-bold p-3 rounded">Verify and sign in</button><a href="{{ url_for('login') }}" class="text-center text-cyan-700">Back to sign in</a></form></body></html>

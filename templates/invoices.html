{% extends 'base.html' %}{% block content %}<div class="flex justify-between items-center mb-7"><h1 class="text-3xl font-semibold">{{ t.invoices }}</h1><a class="bg-cyan-400 text-slate-950 font-bold px-4 py-3 rounded-xl" href="{{ url_for('new_invoice') }}">+ {{ t.new_invoice }}</a></div><div class="rounded-2xl bg-slate-900 border border-slate-800 overflow-hidden">{% for invoice in invoices %}<a class="block p-5 border-b border-slate-800 hover:bg-slate-800/60" href="{{ url_for('invoice_detail', invoice_id=invoice.id) }}"><div class="flex justify-between"><b>{{ invoice.number }}</b><span>€{{ '%.2f'|format(invoice.total) }}</span></div><p class="text-slate-400 mt-1">{{ invoice.customer }} · {{ invoice.status }}</p></a>{% else %}<p class="p-8 text-slate-400">No invoices.</p>{% endfor %}</div>{% endblock %}

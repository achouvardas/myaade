<!doctype html><html lang="{{ locale }}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><script src="https://cdn.tailwindcss.com"></script><title>myAade — calm finance</title></head><body class="bg-slate-950 text-slate-100 min-h-screen"><main class="max-w-6xl mx-auto px-5 py-7"><nav class="flex items-center justify-between mb-10"><a href="{{ url_for('dashboard') }}" class="text-xl font-bold tracking-tight">my<span class="text-cyan-400">Aade</span></a><div class="flex gap-3 items-center"><span class="text-xs px-3 py-1 rounded-full bg-cyan-400/10 text-cyan-300">{{ mode|upper }}</span><a href="{{ url_for('invoices') }}" class="text-sm text-slate-300">{{ t.invoices }}</a><a href="{{ url_for('clients') }}" class="text-sm text-slate-300">Clients</a><form method="post" action="{{ url_for('set_locale', code='el' if locale == 'en' else 'en') }}"><button class="text-sm border border-slate-700 px-3 py-1 rounded-lg">{{ 'ΕΛ' if locale == 'en' else 'EN' }}</button></form></div></nav>{% with messages=get_flashed_messages(with_categories=true) %}{% for category,message in messages %}<div class="mb-5 rounded-xl p-4 {{ 'bg-rose-900/50' if category == 'error' else 'bg-emerald-900/50' }}">{{ message }}</div>{% endfor %}{% endwith %}{% block content %}{% endblock %}</main></body></html>
